name: Rain Watch SG

on:
  schedule:
    # Every 30 minutes. GitHub may delay this slightly under load — that's normal.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write         # needed so the workflow can commit the report + log back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rain watch script
        run: python rain_watch.py

      - name: Commit updated report and log
        run: |
          git config user.name "rain-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/index.html data/rain_watch_log.csv
          git diff --quiet --cached || git commit -m "Update rain watch report [skip ci]"
          git push
